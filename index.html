<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Zhooo</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="assets/js/tailwind.config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="min-h-screen bg-[#0a0a0f] text-white antialiased">
    <div class="fixed inset-0 dark-gradient" style="background: radial-gradient(ellipse_80%_50%_at_50%-20%,rgba(102,126,234,0.15),transparent),radial-gradient(ellipse_60%_40%_at_80%_60%,rgba(118,75,162,0.1),transparent),radial-gradient(ellipse_50%_30%_at_20%_80%,rgba(240,147,251,0.08),transparent),#0a0a0f;"></div>
    <div id="pixi-particles" class="fixed inset-0 pointer-events-none z-[1]"></div>
    <div class="fixed inset-0 pointer-events-none dark-grid" style="background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 60px 60px;"></div>
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-[2]">
        <div class="absolute w-[400px] h-[400px] rounded-full blur-[80px] bg-[rgba(102,126,234,0.3)] -top-[100px] -left-[100px] dark-glow" style="animation: float 20s ease-in-out infinite;"></div>
        <div class="absolute w-[300px] h-[300px] rounded-full blur-[80px] bg-[rgba(240,147,251,0.25)] -bottom-[50px] -right-[50px] dark-glow" style="animation: float 20s ease-in-out infinite; animation-delay: -7s;"></div>
        <div class="absolute w-[250px] h-[250px] rounded-full blur-[80px] bg-[rgba(118,75,162,0.3)] top-1/2 left-[60%] dark-glow" style="animation: float 20s ease-in-out infinite; animation-delay: -14s;"></div>
    </div>

    <div id="app" class="relative z-10 min-h-screen flex flex-col items-center justify-center px-6 py-12">
        <div class="w-full max-w-md">
            <div class="text-center mb-10">
                <div class="relative w-28 h-28 mx-auto mb-6">
                    <div class="absolute inset-[-4px] rounded-full bg-gradient-to-r from-[#667eea] via-[#764ba2] to-[#f093fb]" style="animation: spin 8s linear infinite;"></div>
                    <div class="absolute inset-[3px] rounded-full bg-[#0a0a0f] avatar-ring-bg"></div>
                    <div class="absolute inset-[6px] rounded-full overflow-hidden">
                        <img :src="avatar" :alt="avatarAlt" class="w-full h-full object-cover">
                    </div>
                </div>
                <h1 class="text-3xl font-bold mb-2 bg-gradient-to-r from-[#667eea] via-[#764ba2] to-[#f093fb] bg-clip-text text-transparent">{{ title }}</h1>
                <p class="text-sm text-[#8b8b9a] text-secondary-dark">{{ subtitle }}</p>
            </div>

            <div class="bg-white/5 backdrop-blur-xl rounded-2xl border border-white/10 p-6 shadow-[0_8px_32px_rgba(0,0,0,0.3)] glass-card">
                <div class="mb-6">
                    <div class="text-xs uppercase tracking-wider text-[#8b8b9a] mb-3 flex items-center gap-2 text-secondary-dark">
                        <span class="w-2 h-2 rounded-full bg-gradient-to-r from-[#667eea] to-[#f093fb] animate-pulse"></span>
                        {{ urlLabel }}
                    </div>
                    <div class="bg-black/30 rounded-xl p-4 font-mono text-sm text-center cursor-pointer hover:bg-[#667eea]/10 hover:border-[#667eea]/30 transition-all duration-300 border border-white/5 url-box">{{ repoUrl }}</div>
                </div>

                <div class="space-y-3">
                    <button class="w-full py-3 px-4 rounded-xl font-medium text-white bg-gradient-to-r from-[#667eea] to-[#764ba2] hover:shadow-[0_4px_20px_rgba(102,126,234,0.4)] hover:-translate-y-0.5 active:translate-y-0 transition-all duration-300 flex items-center justify-center gap-2" @click="copyRepoUrl">
                        <svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                            <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                        </svg>
                        {{ copyBtnText }}
                    </button>
                    
                    <div class="flex gap-3">
                        <a v-for="store in stores" :key="store.name" :href="store.url + repoUrl" class="flex-1 py-3 px-4 rounded-xl font-medium text-sm border border-white/10 hover:border-white/20 hover:bg-white/5 transition-all duration-300 flex items-center justify-center gap-2 btn-outline text-dark">
                            <svg v-if="store.name === 'Cydia'" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4 text-[#ff8c00]">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
                            </svg>
                            <svg v-else viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4 text-[#2ecc71]">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                            </svg>
                            {{ store.name }}
                        </a>
                    </div>
                </div>
            </div>

            <footer class="text-center mt-8">
                <p class="text-xs text-[#8b8b9a]/60 text-secondary-dark">{{ copyright }}</p>
            </footer>
        </div>

        <div class="fixed top-6 left-1/2 -translate-x-1/2 bg-[#667eea]/95 text-white px-6 py-3 rounded-lg font-medium opacity-0 pointer-events-none transition-all duration-300" :class="{ 'opacity-100 translate-y-0': isToastVisible }" style="transform: translateX(-50%) translateY(-20px);">{{ toastText }}</div>
    </div>

    <script src="https://pixijs.download/v8.9.2/pixi.min.js"></script>
    <script src="assets/js/pixi-particles.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
