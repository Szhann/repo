<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <!-- import CSS -->
  <link rel="stylesheet" href="./public/css/element-ui.css">
  <!-- import Vue before Element -->
  <script src="./public/js/vue.min.js"></script>
  <!-- import JavaScript -->
  <script src="./public/js/element-ui.js"></script>
  <!-- 推荐：根据需要加载，引入基础框架 -->
  <script src="./public/JParticles-2.0.1/jparticles.js"></script>
  <!-- 引入粒子特效 -->
  <script src="./public/JParticles-2.0.1/particle.js"></script>
</head>
<style>
  html,body{
    width:100%;
    height:100%;
  }
  #zhs{
    width:100%;
    height:100%;
  }
  .text {
    font-size: 14px;
  }

  .item {
    padding: 18px 0;
  }
  .box-card {
    width: 480px;
    height: 480px;
    background: #eeeeee
  }
</style>
<body>
  <el-row>
    <el-col :span="24"><div id="zhs"></div></el-col>
    <el-card class="box-card" shadow="always">
      <div v-for="o in 4" :key="o" class="text item">
        {{'列表内容 ' + o }}
      </div>
    </el-card>
  </el-row>
  
  <script>
    // 使用 new JParticles.特效名 创建特效
    new JParticles.particle('#zhs',{
        // range 等于 0，粒子之间不连线
      range: 0,
      num: 80,
      maxR: 20,
      minR: 10,
      maxSpeed: 3
    });
  </script>
</body>
</html>
